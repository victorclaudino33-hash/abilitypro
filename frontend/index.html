<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ability Pro — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #070B11;
      --bg2:        #0C1220;
      --panel:      #0F1825;
      --border:     #1A2B40;
      --border2:    #243550;
      --amber:      #E8192C;
      --amber2:     #C8101F;
      --amber-dim:  rgba(232,25,44,0.09);
      --amber-glow: rgba(232,25,44,0.35);
      --cyan:       #00C8FF;
      --text:       #B8CCE0;
      --text-dim:   #4E6880;
      --text-muted: #2A3D55;
      --red:        #FF4560;
      --green:      #00E676;
    }
    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .grid-bg {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,200,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 30s linear infinite;
    }
    @keyframes gridDrift { to { background-position: 48px 48px; } }
    .glow-amber {
      position: fixed; top: -200px; left: -200px;
      width: 700px; height: 700px; pointer-events: none;
      background: radial-gradient(circle, rgba(245,166,35,0.05) 0%, transparent 65%);
    }
    .glow-cyan {
      position: fixed; bottom: -200px; right: -200px;
      width: 600px; height: 600px; pointer-events: none;
      background: radial-gradient(circle, rgba(0,200,255,0.04) 0%, transparent 65%);
    }

    .wrap {
      position: relative; z-index: 1;
      display: flex; width: 880px; max-width: 96vw; min-height: 520px;
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px rgba(0,200,255,0.04), 0 50px 100px rgba(0,0,0,0.7);
      animation: appear 0.7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes appear {
      from { opacity: 0; transform: scale(0.97) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── LEFT ── */
    .side {
      width: 340px; flex-shrink: 0;
      background: var(--bg2);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 48px 36px;
      position: relative; overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .corner { position: absolute; width: 60px; height: 60px; }
    .corner.tl { top: 0; left: 0; border-top: 2px solid var(--amber); border-left: 2px solid var(--amber); }
    .corner.br { bottom: 0; right: 0; border-bottom: 2px solid var(--amber); border-right: 2px solid var(--amber); }
    .scan {
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px; background: linear-gradient(90deg, transparent, var(--amber), transparent);
      animation: scanDown 5s ease-in-out infinite;
    }
    @keyframes scanDown {
      0%   { top: 0%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    .logo { text-align: center; position: relative; z-index: 1; }
    .logo-diamond {
      width: 82px; height: 82px; margin: 0 auto 20px;
      position: relative; display: flex; align-items: center; justify-content: center;
    }
    .logo-diamond::before {
      content: '';
      position: absolute; inset: 0;
      border: 2px solid var(--amber);
      transform: rotate(45deg);
      background: var(--amber-dim);
      animation: pulse 3s ease-in-out infinite;
    }
    .logo-diamond::after {
      content: '';
      position: absolute; inset: 8px;
      border: 1px solid rgba(245,166,35,0.3);
      transform: rotate(45deg);
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 var(--amber-glow); }
      50%      { box-shadow: 0 0 20px 4px rgba(245,166,35,0.15); }
    }
    .logo-diamond span {
      position: relative; z-index: 1;
      font-family: 'Rajdhani', sans-serif;
      font-size: 24px; font-weight: 700;
      color: var(--amber); letter-spacing: 3px;
    }
    .logo-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px; font-weight: 700;
      color: #fff; letter-spacing: 5px; text-transform: uppercase;
    }
    .logo-sub {
      font-size: 9px; font-weight: 600; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase; margin-top: 6px;
    }

    .features {
      margin-top: 44px; width: 100%;
      display: flex; flex-direction: column; gap: 10px;
      position: relative; z-index: 1;
    }
    .feat {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      border: 1px solid var(--border); background: rgba(0,0,0,0.25);
      position: relative; overflow: hidden;
    }
    .feat::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: var(--amber);
    }
    .feat-dot {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
      background: var(--amber); box-shadow: 0 0 6px var(--amber);
    }
    .feat-dot.c { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
    .feat span { font-size: 11px; color: var(--text-dim); letter-spacing: 0.3px; }

    /* ── RIGHT ── */
    .form-area {
      flex: 1; background: var(--panel);
      display: flex; flex-direction: column; justify-content: center;
      padding: 52px 50px; position: relative;
    }
    .badge {
      position: absolute; top: 20px; right: 20px;
      font-size: 9px; font-weight: 700;
      color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase;
    }
    .badge::before { content: '[ '; color: var(--amber); }
    .badge::after  { content: ' ]'; color: var(--amber); }

    .title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 36px; font-weight: 700;
      color: #fff; letter-spacing: 2px; line-height: 1; margin-bottom: 4px;
    }
    .title em { color: var(--amber); font-style: normal; }
    .subtitle {
      font-size: 11px; color: var(--text-dim);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px;
    }

    .fg { margin-bottom: 22px; }
    .fg label {
      display: block; font-size: 9px; font-weight: 700;
      color: var(--amber); text-transform: uppercase;
      letter-spacing: 2.5px; margin-bottom: 8px;
    }
    .iw { position: relative; display: flex; }
    .iw::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--border2);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .iw:focus-within::before {
      background: var(--amber);
      box-shadow: 0 0 8px var(--amber-glow);
    }
    .fg input {
      flex: 1;
      padding: 13px 16px 13px 18px;
      background: var(--bg2); border: 1px solid var(--border); border-left: none;
      color: var(--text); font-size: 14px; font-weight: 500;
      font-family: 'Exo 2', sans-serif; letter-spacing: 0.5px;
      outline: none; transition: border-color 0.2s;
    }
    .fg input::placeholder { color: var(--text-muted); }
    .fg input:focus { border-color: var(--border2); }

    .btn {
      width: 100%; padding: 15px;
      background: var(--amber); color: #070B11;
      border: none; cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      transition: all 0.2s; margin-top: 8px;
      position: relative; overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.4s;
    }
    .btn:hover::before { left: 100%; }
    .btn:hover {
      background: #FF4466;
      box-shadow: 0 0 40px var(--amber-glow), 0 8px 32px rgba(0,0,0,0.5);
      transform: translateY(-2px);
    }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    .err {
      background: rgba(255,69,96,0.07); border: 1px solid rgba(255,69,96,0.25);
      color: var(--red); padding: 10px 14px; font-size: 12px;
      letter-spacing: 0.3px; margin-top: 14px; display: none;
    }
    .err.on { display: block; }

    .sbar {
      position: absolute; bottom: 18px; left: 50px;
      display: flex; align-items: center; gap: 8px;
    }
    .sdot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .stxt { font-size: 9px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }

    @media(max-width:640px){
      .side{display:none}
      .form-area{padding:36px 24px}
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-amber"></div>
  <div class="glow-cyan"></div>

  <div class="wrap">
    <div class="side">
      <div class="corner tl"></div>
      <div class="corner br"></div>
      <div class="scan"></div>

      <div class="logo">
        <div class="logo-diamond"><span>AP</span></div>
        <div class="logo-name">Ability Pro</div>
        <div class="logo-sub">Certificação Corporativa</div>
      </div>

      <div class="features">
        <div class="feat"><div class="feat-dot"></div><span>Assinatura Digital Certificada</span></div>
        <div class="feat"><div class="feat-dot c"></div><span>Manifesto Jurídico Automático</span></div>
        <div class="feat"><div class="feat-dot"></div><span>Gestão Completa de NRs</span></div>
        <div class="feat"><div class="feat-dot c"></div><span>Armazenamento Centralizado</span></div>
      </div>
    </div>

    <div class="form-area">
      <div class="badge">Acesso Restrito</div>

      <div class="title">BEM-VINDO<br><em>DE VOLTA</em></div>
      <div class="subtitle">Autenticação do sistema</div>

      <div class="fg">
        <label>Identificador</label>
        <div class="iw">
          <input type="text" id="username" placeholder="Admin" autocomplete="username">
        </div>
      </div>
      <div class="fg">
        <label>Senha de Acesso</label>
        <div class="iw">
          <input type="password" id="password" placeholder="• • • • • • • •" autocomplete="current-password">
        </div>
      </div>

      <button class="btn" id="btnLogin" onclick="doLogin()">Acessar Sistema</button>
      <div class="err" id="errMsg"></div>

      <div class="sbar">
        <div class="sdot"></div>
        <span class="stxt">Sistema Online — v3.0.0</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.querySelectorAll('input').forEach(el =>
      el.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); })
    );

    async function doLogin() {
      const btn  = document.getElementById('btnLogin');
      const err  = document.getElementById('errMsg');
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;

      if(!user||!pass){ err.textContent='⚠  Preencha usuário e senha.'; err.classList.add('on'); return; }
      btn.disabled=true; btn.textContent='Autenticando...'; err.classList.remove('on');

      try {
        const r = await fetch(`${BACKEND_URL}/api/auth/login`,{
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({username:user,password:pass})
        });
        const d = await r.json();
        if(!r.ok) throw new Error(d.error||'Credenciais inválidas');
        localStorage.setItem('ap_token',d.token);
        localStorage.setItem('ap_user',d.username);
        window.location.href='admin.html';
      } catch(e) {
        err.textContent='⚠  '+e.message; err.classList.add('on');
        btn.disabled=false; btn.textContent='Acessar Sistema';
      }
    }
  </script>
</body>
</html>
